version: '3.8'

services:
  app:
    build: .
    ports:
      - \"8000:8000\"
    environment:
      - DATABASE_URL=mysql+aiomysql://root:password@db:3306/ai_video_prod?charset=utf8mb4
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ai_video_prod
    ports:
      - \"3306:3306\"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - \"6379:6379\"

volumes:
  mysql_data: