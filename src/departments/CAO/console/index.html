<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>流程交付台 / CAO 管理台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --panel: #fffdf9;
      --panel-soft: #faf7f1;
      --line: #e4dccf;
      --text: #1f2937;
      --muted: #667085;
      --accent: #0f766e;
      --accent-soft: #def7f3;
      --success: #166534;
      --success-soft: #ecfdf3;
      --warning: #9a6700;
      --warning-soft: #fff7db;
      --error: #b42318;
      --error-soft: #fff1ef;
      --dark: #111827;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f7f4ee 0%, #ede7dc 100%);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(360px, 460px);
      gap: 18px;
      padding: 18px;
    }

    .surface {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .shell {
      min-height: calc(100vh - 36px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .header,
    .composer,
    .rail {
      padding: 18px 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      border-bottom: 1px solid var(--line);
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .subtitle,
    .meta,
    .hint,
    .empty {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .status-chip {
      min-width: 200px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      line-height: 1.45;
    }

    .messages {
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: min(88%, 760px);
      padding: 12px 14px;
      border-radius: 8px;
      white-space: pre-wrap;
      line-height: 1.55;
      font-size: 14px;
      border: 1px solid transparent;
    }

    .message.user {
      align-self: flex-end;
      background: var(--dark);
      color: #f9fafb;
    }

    .message.reply,
    .message.result,
    .message.report {
      align-self: flex-start;
      background: #fffaf0;
      border-color: #eadfcf;
    }

    .message.status {
      align-self: flex-start;
      background: #f0faf8;
      border-color: #c7ebe4;
      color: #115e59;
    }

    .message.error {
      align-self: flex-start;
      background: var(--error-soft);
      border-color: #f1c3bf;
      color: var(--error);
    }

    .composer {
      border-top: 1px solid var(--line);
      display: grid;
      gap: 12px;
    }

    .label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .composer-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 120px;
      gap: 12px;
      align-items: end;
    }

    textarea {
      width: 100%;
      min-height: 88px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fffdfa;
      color: inherit;
      font: inherit;
    }

    button {
      height: 44px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.56;
      cursor: wait;
    }

    .rail {
      min-height: calc(100vh - 36px);
      display: grid;
      grid-auto-rows: min-content;
      align-content: start;
      gap: 16px;
      overflow-y: auto;
    }

    .rail-block {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
    }

    .rail-title {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.3;
    }

    .summary-grid,
    .run-grid,
    .trace-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .card,
    .trace-item {
      padding: 12px;
      border: 1px solid #e7ddcf;
      border-radius: 8px;
      background: #fff;
    }

    .card strong,
    .trace-item strong {
      display: block;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .card span,
    .trace-item span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .run-card {
      cursor: pointer;
    }

    .run-card.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f3efe8;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 1024px) {
      .app {
        grid-template-columns: 1fr;
      }

      .shell,
      .rail {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="surface shell">
      <header class="header">
        <div>
          <h1 class="title">流程交付台 / CAO 管理台</h1>
          <div class="subtitle">CEO 隐身运行，CAO 负责对外交付。</div>
        </div>
        <div class="status-chip" id="statusChip">正在等待状态刷新</div>
      </header>

      <div class="messages" id="messageList">
        <div class="message status">已连接控制台，页面会自动读取 /api/cao/pipeline-status。</div>
      </div>

      <footer class="composer">
        <div>
          <label class="label" for="messageInput">消息输入</label>
          <div class="composer-row">
            <textarea id="messageInput" placeholder="输入要发送给 CMO 的消息。"></textarea>
            <button id="sendButton" type="button">发送</button>
          </div>
        </div>
        <div class="meta">接口：/api/cmo/chat /api/cao/pipeline-status /api/cao/runs/</div>
      </footer>
    </section>

    <aside class="rail">
      <section class="rail-block">
        <h2 class="rail-title">主链路状态</h2>
        <div class="summary-grid" id="summaryGrid">
          <div class="card"><strong>等待刷新</strong><span>加载 /api/cao/pipeline-status 中。</span></div>
        </div>
      </section>

      <section class="rail-block">
        <h2 class="rail-title">最近任务</h2>
        <div class="run-grid" id="runGrid">
          <div class="card"><strong>暂无任务</strong><span>接口返回后会展示最近运行。</span></div>
        </div>
      </section>

      <section class="rail-block">
        <h2 class="rail-title">链路回放</h2>
        <div class="trace-grid" id="traceGrid">
          <div class="empty">点击最近任务中的条目即可查看回放。</div>
        </div>
      </section>
    </aside>
  </main>

  <script>
    const messageList = document.getElementById("messageList");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const statusChip = document.getElementById("statusChip");
    const summaryGrid = document.getElementById("summaryGrid");
    const runGrid = document.getElementById("runGrid");
    const traceGrid = document.getElementById("traceGrid");

    const escapeHtml = (value) =>
      String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");

    function appendMessage(kind, title, text) {
      const node = document.createElement("div");
      node.className = `message ${kind}`;
      node.innerHTML = `<strong>${escapeHtml(title)}</strong><div>${escapeHtml(text)}</div>`;
      messageList.appendChild(node);
      messageList.scrollTop = messageList.scrollHeight;
      return node;
    }

    function renderSummary(status) {
      const metrics = status.pipeline_metrics || {};
      const items = [
        ["总任务数", metrics.total_runs],
        ["成功率", metrics.success_rate],
        ["质检通过率", metrics.qa_pass_rate],
        ["交付就绪率", metrics.delivery_ready_rate],
        ["活跃任务", metrics.active_runs],
        ["平均 Token", metrics.avg_tokens],
      ];

      summaryGrid.innerHTML = items
        .map(([label, value]) => `
          <div class="card">
            <strong>${escapeHtml(label)}</strong>
            <span>${escapeHtml(value ?? "-")}</span>
          </div>
        `)
        .join("");
    }

    function renderRuns(status) {
      const runs = status.recent_runs || [];
      if (!runs.length) {
        runGrid.innerHTML = '<div class="empty">暂无最近任务。</div>';
        return;
      }

      runGrid.innerHTML = runs
        .map((run, index) => `
          <div class="card run-card ${index === 0 ? "active" : ""}" data-run-id="${escapeHtml(run.uuid || "")}">
            <strong>${escapeHtml(run.domain || "未命名任务")}</strong>
            <span>平台：${escapeHtml(run.platform || "-")}</span>
            <span>状态：${escapeHtml(run.status || "-")}</span>
            <span>质检：${escapeHtml(run.qa_status || "-")}</span>
            <div class="pill">${escapeHtml(run.workflow_type || "domain_auto_run")}</div>
          </div>
        `)
        .join("");

      Array.from(runGrid.querySelectorAll(".run-card")).forEach((card) => {
        card.addEventListener("click", () => {
          Array.from(runGrid.querySelectorAll(".run-card")).forEach((item) => item.classList.remove("active"));
          card.classList.add("active");
          loadTrace(card.dataset.runId);
        });
      });

      const first = runs[0];
      if (first && first.uuid) {
        loadTrace(first.uuid);
      }
    }

    function renderTrace(trace) {
      const steps = trace.steps || [];
      if (!steps.length) {
        traceGrid.innerHTML = '<div class="empty">暂无回放记录。</div>';
        return;
      }

      traceGrid.innerHTML = steps
        .map((step) => `
          <div class="trace-item">
            <strong>${escapeHtml(step.stage || step.name || "步骤")}</strong>
            <span>${escapeHtml(step.status || "-")} / ${escapeHtml(step.message || "")}</span>
          </div>
        `)
        .join("");
    }

    async function loadStatus() {
      const response = await fetch("/api/cao/pipeline-status");
      const status = await response.json();
      statusChip.textContent = status.console_subtitle || "CAO 管理台已就绪";
      renderSummary(status);
      renderRuns(status);
    }

    async function loadTrace(workflowRunId) {
      if (!workflowRunId) return;
      const response = await fetch(`/api/cao/runs/${encodeURIComponent(workflowRunId)}/trace`);
      if (!response.ok) {
        traceGrid.innerHTML = '<div class="empty">链路回放加载失败。</div>';
        return;
      }
      const trace = await response.json();
      renderTrace(trace);
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;
      sendButton.disabled = true;
      appendMessage("user", "你", message);
      messageInput.value = "";

      try {
        const response = await fetch("/api/cmo/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        if (!response.ok || !response.body) {
          appendMessage("error", "CMO", "消息发送失败。");
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split(/\r?\n/);
          buffer = lines.pop() || "";
          for (const line of lines) {
            if (!line.trim()) continue;
            try {
              const event = JSON.parse(line);
              if (event.type === "reply") {
                appendMessage("reply", "CMO", event.message || "已收到。");
              } else if (event.type === "status") {
                const stage = event.stage || "流程";
                appendMessage("status", stage, event.message || `${stage} 已更新。`);
              } else if (event.type === "report") {
                appendMessage("report", "报告", event.message || "收到报告。");
              } else if (event.type === "result") {
                appendMessage("result", "结果", event.message || "收到结果。");
              } else if (event.type === "error") {
                appendMessage("error", "错误", event.message || "发生错误。");
              }
            } catch {
              appendMessage("reply", "CMO", line);
            }
          }
        }
      } catch (error) {
        appendMessage("error", "错误", error instanceof Error ? error.message : "发送失败。");
      } finally {
        sendButton.disabled = false;
      }
    }

    sendButton.addEventListener("click", sendMessage);
    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        sendMessage();
      }
    });

    loadStatus().catch((error) => {
      statusChip.textContent = "CAO 管理台加载失败";
      appendMessage("error", "错误", error instanceof Error ? error.message : "状态加载失败。");
    });
  </script>
</body>
</html>
