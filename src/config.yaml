# AI Video Auto Production Line - Application Config
app:
  name: "AI Video Auto Production Line"
  version: "1.0.0"
  debug: false
  env: "development"

# Server Config
server:
  host: "0.0.0.0"
  port: 8000
  workers: 1

# Database Config
database:
  url: "mysql+aiomysql://user:password@localhost:3306/ai_video_prod?charset=utf8mb4"
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  echo: false

# Redis Config
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: null
  decode_responses: true

# API Keys
api_keys:
  deepseek:
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com/v1"
    model: "deepseek-v4"
  glm:
    api_key: "${GLM_API_KEY}"
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    model: "glm-5.1"
  seedance:
    api_key: "${SEEDANCE_API_KEY}"
    base_url: "https://api.seedance.ai/v1"
    model: "seedance-2.0"

# Media Storage
storage:
  video_backend: "local"
  media_root: "media"
  media_url_prefix: "/media"
  media_base_url: null
  github:
    owner: "${GITHUB_STORAGE_OWNER}"
    repo: "${GITHUB_STORAGE_REPO}"
    token: "${GITHUB_STORAGE_TOKEN}"
    release_tag: "video-assets"
  ipfs:
    api_url: "http://127.0.0.1:5001"
    gateway_url: "https://ipfs.io/ipfs"
    pin_on_add: true
  s3_compatible:
    endpoint_url: "${S3_ENDPOINT_URL}"
    access_key_id: "${S3_ACCESS_KEY_ID}"
    secret_access_key: "${S3_SECRET_ACCESS_KEY}"
    bucket: "${S3_BUCKET}"
    region: "${S3_REGION}"
    object_prefix: "videos"
    public_base_url: "${S3_PUBLIC_BASE_URL}"

# Cost Control
cost_control:
  daily_budget: 1000.0
  warning_threshold: 0.8
  alert_threshold: 1.0
  critical_threshold: 1.2
  api_pricing:
    deepseek-v4:
      input: 0.002
      output: 0.008
    glm-5.1:
      input: 0.005
      output: 0.015
    seedance-2.0:
      per_second: 0.5

# Hotspot Collection
hotspot:
  schedule:
    - "0 0 * * *"
    - "0 12 * * *"
  platforms:
    - "douyin"
    - "xiaohongshu"
    - "bilibili"
  categories:
    - "knowledge"
    - "emotion"
    - "product"
    - "entertainment"
  limits:
    default: 10
    max: 50
  filters:
    min_view_count: 10000
    min_like_count: 1000
  retention_days: 30

# Logging
logging:
  level: "INFO"
  format: "json"
  file: "logs/app.log"
  max_bytes: 10485760
  backup_count: 5

# Monitoring
monitoring:
  prometheus_enabled: true
  metrics_port: 9090
  health_check_interval: 30
