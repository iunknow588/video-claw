deepseek:
  api_key: "${DEEPSEEK_API_KEY}"
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-v4"

glm:
  api_key: "${GLM_API_KEY}"
  base_url: "https://open.bigmodel.cn/api/paas/v4"
  model: "glm-5.1"
  resource_id: ""

xfyun_maas:
  api_key: "${XFYUN_MAAS_API_KEY}"
  base_url: "${XFYUN_MAAS_BASE_URL:https://maas-coding-api.cn-huabei-1.xf-yun.com/v2}"
  model: "${XFYUN_MAAS_MODEL:astron-code-latest}"
  resource_id: "${XFYUN_MAAS_RESOURCE_ID:}"

hidream:
  app_id: "${HIDREAM_APP_ID:}"
  api_key: "${HIDREAM_API_KEY:}"
  api_secret: "${HIDREAM_API_SECRET:}"
  create_url: "${HIDREAM_CREATE_URL:https://cn-huadong-1.xf-yun.com/v1/private/s3fd61810/create}"
  query_url: "${HIDREAM_QUERY_URL:https://cn-huadong-1.xf-yun.com/v1/private/s3fd61810/query}"
  default_resolution: "${HIDREAM_DEFAULT_RESOLUTION:2k}"
  default_aspect_ratio: "${HIDREAM_DEFAULT_ASPECT_RATIO:9:16}"

seedance:
  api_key: "${SEEDANCE_API_KEY}"
  base_url: "${SEEDANCE_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}"
  model: "${SEEDANCE_MODEL:doubao-seedance-2-0-260128}"
  resource_id: "${SEEDANCE_RESOURCE_ID:}"

runtime:
  http_timeout: 60.0
  max_retries: 2
  use_placeholder_when_unconfigured: true
