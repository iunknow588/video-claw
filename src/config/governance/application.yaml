app:
  name: "AI Video Auto Production Line"
  version: "1.0.0"
  debug: false
  env: "development"

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1

logging:
  level: "INFO"
  format: "json"
  file: "runtime/logs/app.log"
  max_bytes: 10485760
  backup_count: 5

monitoring:
  prometheus_enabled: true
  metrics_port: 9090
  health_check_interval: 30
