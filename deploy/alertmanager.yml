"""
Alertmanager configuration for workflow alerts.
"""
global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@workflow.local'

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://app:8000/webhooks/alerts'
        send_resolved: true
        
  - name: 'critical'
    webhook_configs:
      - url: 'http://app:8000/webhooks/alerts/critical'
        send_resolved: true
    email_configs:
      - to: 'ops@company.com'
        subject: 'CRITICAL: Workflow Alert'
        
  - name: 'warning'
    webhook_configs:
      - url: 'http://app:8000/webhooks/alerts/warning'
        send_resolved: true
