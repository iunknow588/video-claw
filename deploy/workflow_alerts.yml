"""
Prometheus alert rules for workflow monitoring.
"""
groups:
  - name: workflow_alerts
    rules:
      - alert: WorkflowTriggerFailure
        expr: rate(trigger_fired_total{status="failed"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Workflow trigger failing"
          description: "Trigger {{ $labels.trigger_id }} has failure rate > 10%"
          
      - alert: WorkflowTriggerHighLatency
        expr: histogram_quantile(0.95, rate(trigger_execution_duration_seconds_bucket[5m])) > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Workflow trigger latency high"
          description: "95th percentile latency > 300s"
          
      - alert: WorkflowTriggerConsecutiveFailures
        expr: increase(trigger_fired_total{status="failed"}[15m]) >= 3
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Trigger consecutive failures"
          description: "Trigger {{ $labels.trigger_id }} failed 3+ times in 15m"
          
      - alert: WorkflowActiveRunsHigh
        expr: sum(active_workflow_runs) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of active workflows"
          description: "{{ $value }} workflows currently running"
